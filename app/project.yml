name: Glance
options:
  bundleIdPrefix: app.glance
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

packages:
  GlanceCore:
    path: ..

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    # Team is taken from the environment so a different builder (e.g. a paid
    # Developer account for TestFlight) can sign without editing tracked files:
    #   DEVELOPMENT_TEAM=XXXXXXXXXX xcodegen generate
    # scripts/gen.sh defaults this to the original free team for local builds.
    DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"

targets:
  # ----- iPhone app -----
  GlanceApp:
    type: application
    platform: iOS
    sources:
      - GlanceApp
      - Shared/GlanceActivityAttributes.swift
      - Shared/SharedStore.swift
      - Shared/WatchLink.swift
      - Shared/ThickBar.swift
      - Shared/Theme.swift
    dependencies:
      - package: GlanceCore
        product: GlanceCore
      - target: GlanceWidget
        embed: true
      # GlanceWatch embed removed for now: a free personal team can't generate a
      # watchOS profile without a registered Apple Watch. Re-add `- target:
      # GlanceWatch / embed: true` once a real Apple Watch is paired to Xcode.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zaid.glance
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: GlanceApp/Info.plist
      properties:
        CFBundleDisplayName: Glance
        UILaunchScreen: {}
        # Glance only uses standard ChaCha20-Poly1305 for its own sync — exempt
        # from export compliance. Declaring it here skips the per-upload prompt
        # on TestFlight / App Store Connect.
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        NSLocalNetworkUsageDescription: "Glance connects to your Mac on your local network to show task progress."
        NSBonjourServices:
          - _glance-sync._tcp
          - _glance-sync._udp

  # ----- Widgets + Live Activity (app extension) -----
  GlanceWidget:
    type: app-extension
    platform: iOS
    sources:
      - GlanceWidget
      - Shared/GlanceActivityAttributes.swift
      - Shared/SharedStore.swift
      - Shared/ThickBar.swift
      - Shared/Theme.swift
    dependencies:
      - package: GlanceCore
        product: GlanceCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zaid.glance.widget
    info:
      path: GlanceWidget/Info.plist
      properties:
        CFBundleDisplayName: Glance
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  # ----- Apple Watch app -----
  GlanceWatch:
    type: application
    platform: watchOS
    sources:
      - GlanceWatch
      - Shared/SharedStore.swift
      - Shared/WatchLink.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zaid.glance.watchkitapp
    info:
      path: GlanceWatch/Info.plist
      properties:
        CFBundleDisplayName: Glance
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.zaid.glance

# Explicit shared scheme so GlanceApp always appears in the run dropdown
# (and so the macOS CLI schemes — glance/glance-bar — aren't picked by mistake).
schemes:
  GlanceApp:
    build:
      targets:
        GlanceApp: all
    run:
      config: Debug
    archive:
      config: Release
